<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Bear Setup</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-elevated: #1a1a25;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(255,255,255,0.1);
            --success: #22c55e;
            --error: #ef4444;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
        }
        
        /* Header */
        .header {
            text-align: center;
            padding: 2rem 0;
            border-bottom: 1px solid var(--border);
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .logo-icon {
            font-size: 3rem;
        }
        
        .logo-text {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #6366f1 0%, #ec4899 50%, #f59e0b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
        
        /* Progress Bar */
        .progress-bar {
            display: flex;
            justify-content: space-between;
            margin: 2rem 0;
            padding: 0 1rem;
        }
        
        .progress-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            position: relative;
        }
        
        .progress-step:not(:last-child)::after {
            content: '';
            position: absolute;
            top: 20px;
            right: -50%;
            width: 100%;
            height: 2px;
            background: var(--border);
            z-index: 0;
        }
        
        .progress-step.completed:not(:last-child)::after {
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
        }
        
        .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            background: var(--bg-elevated);
            border: 2px solid var(--border);
            z-index: 1;
            transition: all 0.3s;
        }
        
        .progress-step.active .step-number {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }
        
        .progress-step.completed .step-number {
            background: var(--success);
            border-color: var(--success);
        }
        
        .step-title {
            margin-top: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .progress-step.active .step-title {
            color: var(--text-primary);
            font-weight: 600;
        }
        
        /* Card */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2rem;
            margin-top: 2rem;
        }
        
        .card-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .card-description {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }
        
        /* Form Elements */
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-primary);
        }
        
        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        input::placeholder {
            color: var(--text-muted);
        }
        
        .help-text {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }
        
        /* Checkbox */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            cursor: pointer;
            padding: 1rem;
            background: var(--bg-elevated);
            border-radius: 0.5rem;
            transition: all 0.3s;
        }
        
        .checkbox-group:hover {
            background: rgba(99, 102, 241, 0.1);
        }
        
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
            cursor: pointer;
        }
        
        .checkbox-label {
            margin: 0;
            cursor: pointer;
        }
        
        .checkbox-description {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }
        
        /* Buttons */
        .button-group {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            gap: 1rem;
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-size: 1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
        
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.2);
        }
        
        /* Feature Cards */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .feature-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            transition: all 0.3s;
        }
        
        .feature-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        
        .feature-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .feature-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        
        .feature-description {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        /* Validation */
        .validation-status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }
        
        .validation-status.valid {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
        }
        
        .validation-status.invalid {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
        }
        
        /* Welcome Screen */
        .welcome-content {
            text-align: center;
        }
        
        .welcome-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }
        
        .welcome-title {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        .welcome-description {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .welcome-features {
            text-align: left;
            background: var(--bg-elevated);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .welcome-features h3 {
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        
        .welcome-features ul {
            list-style: none;
        }
        
        .welcome-features li {
            padding: 0.5rem 0;
            color: var(--text-secondary);
        }
        
        .welcome-features li::before {
            content: '✓';
            color: var(--success);
            margin-right: 0.5rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <span class="logo-icon">🐻</span>
                <span class="logo-text">Coding Bear Setup</span>
            </div>
            <p class="subtitle">Configure your AI coding assistant</p>
        </div>
        
        <!-- Progress Bar -->
        <div class="progress-bar">
            {% for s in steps %}
            <div class="progress-step {% if s.number == step %}active{% elif s.number < step %}completed{% endif %}">
                <div class="step-number">
                    {% if s.number < step %}✓{% else %}{{ s.number }}{% endif %}
                </div>
                <div class="step-title">{{ s.title }}</div>
            </div>
            {% endfor %}
        </div>
        
        <!-- Content Card -->
        <div class="card">
            {% block content %}{% endblock %}
        </div>
    </div>
    
    <script>
        // Validate API key
        async function validateApiKey(provider, apiKey) {
            if (!apiKey) return;
            
            const statusEl = document.getElementById('validation-status');
            statusEl.textContent = 'Validating...';
            statusEl.className = 'validation-status';
            
            try {
                const response = await fetch('/api/validate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({provider, api_key: apiKey})
                });
                
                const data = await response.json();
                
                if (data.valid) {
                    statusEl.textContent = '✓ API Key Valid';
                    statusEl.className = 'validation-status valid';
                } else {
                    statusEl.textContent = '✗ ' + (data.error || 'Invalid API Key');
                    statusEl.className = 'validation-status invalid';
                }
            } catch (e) {
                statusEl.textContent = '✗ Validation failed';
                statusEl.className = 'validation-status invalid';
            }
        }
    </script>
</body>
</html>
